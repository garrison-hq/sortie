name: E2E (manual)

# The full-stack Playwright suite boots the real server and makes one
# live LLM extraction call, so it needs a provider key and is run on
# demand rather than on every push. Set the OPENAI_API_KEY repository
# secret (and optionally E2E_OPENAI_MODEL) before dispatching.

on:
  workflow_dispatch:

jobs:
  e2e:
    name: full-stack e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SORTIE_PROVIDER: openai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.E2E_OPENAI_MODEL || 'gpt-4.1-mini' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm browsers --with-deps
      - run: pnpm --filter @garrison-hq/sortie-ui e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            apps/ui/playwright-report/
            apps/ui/test-results/
          if-no-files-found: ignore
          retention-days: 7
