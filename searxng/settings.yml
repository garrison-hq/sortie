# SearXNG configuration for the nanofish web-search backend.
# Merged over the image's defaults (use_default_settings) — only the overrides
# nanofish needs live here.
use_default_settings: true

server:
  # CHANGE THIS before starting the instance: any long random string, e.g.
  #   openssl rand -hex 32
  # SearXNG uses it to sign its own cookies/forms.
  secret_key: 'CHANGE_ME_TO_A_LONG_RANDOM_STRING'

search:
  # nanofish queries /search?format=json — "json" must be listed here, or the
  # instance answers HTTP 403 to every search request.
  formats:
    - html
    - json
